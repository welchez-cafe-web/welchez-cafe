<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welchez Café - Traslado de Producto Terminado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f1ea;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 900px;
            border: 2px solid #5c4033;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #5c4033;
            margin: 0 0 5px 0;
            font-size: 26px;
            font-weight: bold;
        }
        h2 {
            text-align: center;
            color: #5c4033;
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 600;
        }
        .header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: bold;
            color: #4a3525;
            white-space: nowrap;
        }
        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fafafa;
        }
        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            outline: none;
            border-color: #8b5a2b;
            background-color: #fff;
        }
        .btn-inline {
            background-color: #8b5a2b;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn-inline:hover {
            background-color: #5c4033;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #8b5a2b;
            padding: 6px 8px;
            text-align: left;
        }
        th {
            background-color: #e8e2d5;
            color: #5c4033;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }
        th.cant { width: 10%; }
        th.desc { width: 50%; }
        th.obs { width: 35%; }
        th.actions { width: 5%; text-align: center; }
        
        .btn-delete {
            background: none;
            border: none;
            color: #d9534f;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn-delete:hover {
            color: #c9302c;
        }
        .actions-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .btn-action {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .btn-action:hover {
            background-color: #0056b3;
        }
        
        .footer-section {
            margin-top: 30px;
            border-top: 1px dashed #8b5a2b;
            padding-top: 15px;
        }
        .signature-line {
            width: 300px;
            border-bottom: 1px solid #333;
            display: inline-block;
            margin-left: 10px;
        }
        .received-by {
            font-weight: bold;
            color: #4a3525;
            margin-top: 10px;
        }
        
        /* REGLAS DE OPTIMIZACIÓN EXCLUSIVAS PARA IMPRESIÓN Y CAMBIO A PDF */
        @media print {
            @page {
                size: portrait;
                margin: 0.4cm; /* Márgenes de página mínimos */
            }
            body { 
                background-color: #fff; 
                padding: 0; 
            }
            .container { 
                border: none; 
                box-shadow: none; 
                padding: 10px;
                max-width: 100%;
            }
            h1 { font-size: 22px; }
            h2 { font-size: 18px; margin-bottom: 15px; }
            .header-grid { margin-bottom: 15px; gap: 10px; }
            
            /* Compactar celdas para asegurar hasta 20 filas en una sola hoja */
            th, td { 
                padding: 4px 6px !important; 
                font-size: 12px !important;
            }
            input[type="text"] {
                font-size: 12px !important;
                padding: 2px 4px !important;
            }
            
            .actions-bar, .btn-inline, .btn-delete { display: none !important; }
            th.actions, td.actions-cell { display: none !important; }
            input, select { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; }
            .footer-section { margin-top: 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="documento-traslado">
    <h1>Welchez Café</h1>
    <h2>Traslado de Producto Terminado</h2>

    <div class="header-grid">
        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha">
        </div>
        <div class="form-group">
            <label for="responsable">Responsable:</label>
            <input type="text" id="responsable" placeholder="Nombre del responsable">
        </div>
        <div class="form-group full-width">
            <label for="sucursal">Sucursal destino:</label>
            <select id="sucursal">
                <option value="Welchez Río de Piedras">Welchez Río de Piedras</option>
                <option value="Welchez Pedregal">Welchez Pedregal</option>
                <option value="Welchez La Entrada">Welchez La Entrada</option>
                <option value="Welchez Aeropuerto">Welchez Aeropuerto</option>
            </select>
            <button type="button" class="btn-inline" onclick="agregarSucursal()">Agregar nueva sucursal</button>
        </div>
    </div>

    <datalist id="lista-productos-global"></datalist>

    <table id="tabla-productos">
        <thead>
            <tr>
                <th class="cant">Cantidad</th>
                <th class="desc">Descripción</th>
                <th class="obs">Observaciones</th>
                <th class="actions"></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" style="text-align: center;" placeholder="0"></td>
                <td>
                    <input type="text" list="lista-productos-global" placeholder="Seleccione o escriba un producto...">
                </td>
                <td><input type="text" placeholder="Notas..."></td>
                <td class="actions-cell"><button class="btn-delete" onclick="eliminarFila(this)">×</button></td>
            </tr>
        </tbody>
    </table>

    <div class="actions-bar">
        <button type="button" class="btn-action" onclick="agregarFila()">Agregar fila</button>
        <button type="button" class="btn-action" onclick="window.print()">Guardar PDF</button>
        <button type="button" class="btn-action" onclick="guardarComoImagen()">Guardar Imagen</button>
    </div>

    <div class="footer-section">
        <div class="received-by">
            Recibido por: <span class="signature-line"></span>
        </div>
    </div>
</div>

<script>
    const productos = [
        "ALFAJOR NAVIDEÑO CP", "BANANERO CP", "BOTE DE CHILE LA BRAVA 148 ML CP", "BRAZO GITANO CP", 
        "BRISA CARIBEÑA CP", "BROWNIES", "CHAMPURRADAS", "CHEESSCAKE DE FRESA CP", 
        "CHEESSCAKE DE MORA CP", "CHILE LA BRAVA 2 LTS CP", "CHOCOLATINES BICOLOR CP", 
        "CHOCOLATINES CP", "CHORTCAKE DE FRESA CP", "COCO CARAMELO CP", "CROISSANT NUBE CP", 
        "CROISSANT RELLENO DE PISTACHOS / BICOLOR", "CUBOS DE PISTACHOS CP", "ENERGY BALL", 
        "FLAN DE COCO CP", "FLAN DE QUESO CP", "GALLETA CHOCOCHIPS CP", "GALLETA DE AVENA CP", 
        "GALLETA DE JENGIBRE CP", "GALLETA DE MANI Y CHOCOLATE CP", "GALLETA MATCHA", 
        "JALEA DE PIÑA", "JALEA FRESA CP", "MARQUESOTE", "MINI CROISSANT CP", "MINI DELIRIO MOUV", 
        "MINI GALLETA AVENA", "MINI GALLETA CHOCO CHIPS", "MINI GALLETA DE JENGIBRE CP", 
        "MINI GALLETA MATCHA", "MINI PAN PARMESANO CP", "MINI PISTACHO CHOCOLATE", 
        "MINI QUESADILLA", "MINI RICE CRYSPI CP", "MINI ROSALINA CP", "MINI SEMITAS", 
        "MOCCA CHEESSCAKE", "MUFFIN DE MANZANA", "PAN BLANCO CP", "PAN BRIOCHE CP", 
        "PAN BRIOCHE/TIPO MOLDE", "PAN CAPRICHO CP", "PAN CIABATTA CP", "PAN CROISSANT CP", 
        "PAN CUBO", "PAN DE MUERTO CP", "PAN INTEGRAL CP", "PAN LINAZA CP", "PAN MASA MADRE CP", 
        "PAN MINI INTEGRAL", "PAN MOLDE CP", "PAN PARMESANO CP", "PANCETA CP", 
        "PAÑUELOS DE PESTO,TOMATE,MOZZARELLA CP", "PASTEL DE TRES LECHES CP", "PASTEL DE ZANAHORIA", 
        "PASTEL GERMANICO CP", "PASTEL OREO", "PASTEL PISTACHO Y CARDAMOMO CP", "PASTEL SNIKERS CP", 
        "PASTEL TRES LECHES 8 PIEZAS", "PASTEL TRES LECHES PEQ. (6 PZS) CP", "PECAN PIE CP", 
        "PISTACHITOS", "PURE DE CALABAZA CP", "QUESADILLA COPANECA", "RICE CRISPY CP", 
        "ROLES DE CANELA CP", "ROMPOPO CP", "ROSALINA", "ROSCA DE REYES GRANDE", 
        "ROSCA DE REYES MEDIANA", "ROSCA DE REYES PEQUEÑA", "ROSCA TZIKIN CP", "SEMITAS CP", 
        "SHORTCAKE DE FRESA", "STRUDEL DE MANZANA", "SUSPIRO DE LIMON", "TARTA LINZER CP", 
        "TIRAMISU CP", "TIRAMISU MEDIANO 8 PZS CP", "TIRAMISU PEQUEÑO CP", "TORTA CHILENA GRANDE CP", 
        "TORTA CHILENA PEQ. 6 PEDAZOS CP", "TORTA CHOCOLATE", "TORTA DE ALMENDRA CP", 
        "TORTA DE BANANO CP", "TORTA DE ZANAHORIA CP", "TORTA PARA MARQUESOTE CP", 
        "TORTA PARA TIRAMISÙ", "TORTA PARA TRES LECHES CP", "TRUFA DE DATIL"
    ];

    window.onload = function() {
        const fechaInput = document.getElementById('fecha');
        const hoy = new Date().toISOString().split('T')[0];
        fechaInput.value = hoy;
        
        const datalist = document.getElementById('lista-productos-global');
        productos.forEach(prod => {
            const opt = document.createElement('option');
            opt.value = prod;
            datalist.appendChild(opt);
        });
    };

    function agregarSucursal() {
        const nuevaSucursal = prompt("Ingrese el nombre de la nueva sucursal:");
        if (nuevaSucursal && nuevaSucursal.trim() !== "") {
            const selectSucursal = document.getElementById('sucursal');
            const opt = document.createElement('option');
            opt.value = nuevaSucursal.trim();
            opt.textContent = nuevaSucursal.trim();
            selectSucursal.appendChild(opt);
            selectSucursal.value = opt.value;
        }
    }

    function agregarFila() {
        const tabla = document.getElementById('tabla-productos').getElementsByTagName('tbody')[0];
        const nuevaFila = tabla.insertRow();

        const celdaCant = nuevaFila.insertCell(0);
        const celdaDesc = nuevaFila.insertCell(1);
        const celdaObs = nuevaFila.insertCell(2);
        const celdaActions = nuevaFila.insertCell(3);

        celdaCant.innerHTML = '<input type="text" style="text-align: center;" placeholder="0">';
        celdaDesc.innerHTML = '<input type="text" list="lista-productos-global" placeholder="Seleccione o escriba un producto...">';
        celdaObs.innerHTML = '<input type="text" placeholder="Notas...">';
        celdaActions.className = 'actions-cell';
        celdaActions.innerHTML = '<button class="btn-delete" onclick="eliminarFila(this)">×</button>';
    }

    function eliminarFila(boton) {
        const fila = boton.parentNode.parentNode;
        const tbody = fila.parentNode;
        if (tbody.rows.length > 1) {
            tbody.removeChild(fila);
        } else {
            alert("El formato debe tener al menos una fila.");
        }
    }

    // NUEVA FUNCIÓN CORREGIDA: Renderiza y descarga el documento como un archivo PNG real
    function guardarComoImagen() {
        const contenedor = document.getElementById('documento-traslado');
        const barraAcciones = document.querySelector('.actions-bar');
        const botonesEliminar = document.querySelectorAll('.actions-cell');
        const botonSucursal = document.querySelector('.btn-inline');
        
        // Ocultar temporalmente los elementos interactivos que no deben ir en la foto final
        barraAcciones.style.display = 'none';
        botonSucursal.style.display = 'none';
        botonesEliminar.forEach(btn => btn.style.display = 'none');
        document.querySelectorAll('th.actions').forEach(th => th.style.display = 'none');

        // Renderizar usando html2canvas
        html2canvas(contenedor, {
            scale: 2, // Mejora la calidad y nitidez de la imagen sacada
            backgroundColor: "#ffffff"
        }).then(canvas => {
            // Re-mostrar los elementos interactivos en la pantalla web
            barraAcciones.style.display = 'flex';
            botonSucursal.style.display = 'inline-block';
            botonesEliminar.forEach(btn => btn.style.display = 'table-cell');
            document.querySelectorAll('th.actions').forEach(th => th.style.display = 'table-cell');

            // Crear y gatillar la descarga del archivo PNG
            const link = document.createElement('a');
            link.download = 'traslado_welchez.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(err => {
            alert("Error al generar la imagen. Intente de nuevo.");
            // Asegurar el retorno de los elementos si falla
            barraAcciones.style.display = 'flex';
            botonSucursal.style.display = 'inline-block';
            botonesEliminar.forEach(btn => btn.style.display = 'table-cell');
        });
    }
</script>

</body>
</html>
