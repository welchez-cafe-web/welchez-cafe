<!DOCTYPE html>
<html lang="es">
<head>

        h2 { text-align: center; font-weight: bold; margin-top: 0; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { padding: 8px; margin-top: 5px; box-sizing: border-box; width: 100%; font-size: 14px; font-weight: bold; border: 1px solid #000; }

            <button type="button" style="width:100%; background-color:#6c757d;">Registrar Entrega</button>
        </form>
    </div>

    <div class="acciones">
        <button class="btn-img" onclick="descargarImagen()">📷 Descargar Imagen</button>
        <button class="btn-pdf" onclick="descargarPDF()">📄 Descargar PDF</button>
        <button class="btn-ws" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    function toggleBotones(mostrar) {
        const display = mostrar ? "block" : "none";
        document.querySelector(".acciones").style.display = display;
        document.querySelector("button[type='button']").style.display = display;
    }

    async function descargarImagen() {
        toggleBotones(false);
        const canvas = await html2canvas(document.querySelector("#formulario"), { scale: 2 });
        const link = document.createElement("a");
        link.download = "entrega_materiales.jpg";
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
        toggleBotones(true);
    }

    async function descargarPDF() {
        toggleBotones(false);
        const { jsPDF } = window.jspdf;
        const canvas = await html2canvas(document.querySelector("#formulario"), { scale: 2 });
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jsPDF("p", "mm", "a4");
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const imgWidth = pdfWidth - 20; 
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
        pdf.save("entrega_materiales.pdf");
        toggleBotones(true);
    }

    function enviarWhatsApp() {
        const area = document.getElementById("area").value;
        const resp = document.getElementById("responsable").value;
        const fecha = document.getElementById("fecha").value;
        const msg = `*WELCHEZ CAFÉ*%0A*Entrega de Materiales*%0A--------------------------%0A*Área:* ${area}%0A*Responsable:* ${resp}%0A*Fecha:* ${fecha}`;
        window.open(`https://wa.me/?text=${msg}`, "_blank");
    }
</script>
</body>
</html>
